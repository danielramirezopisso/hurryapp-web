<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HurryApp — Find a throne. Fast.</title>
<meta name="description" content="The community map of usable bathrooms — rated in 🧻 rolls by people who were there in their darkest hour.">
<meta name="theme-color" content="#F8F5EF">
<meta property="og:type" content="website">
<meta property="og:site_name" content="HurryApp">
<meta property="og:title" content="HurryApp — Find a throne. Fast.">
<meta property="og:description" content="The community map of usable bathrooms — rated in 🧻 rolls. Check the Moment of Truth™ before you commit.">
<meta property="og:url" content="https://danielramirezopisso.github.io/hurryapp-web/">
<meta property="og:image" content="https://danielramirezopisso.github.io/hurryapp-web/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --porcelana:#F8F5EF;
  --ink:#26241F;
  --acento:#C75146;       /* refined coral, not neon */
  --acento-dark:#A83D33;
  --oro:#C9A227;          /* muted brass for rolls */
  --ok:#5E8C61;           /* sage */
  --meh:#C9A227;
  --bad:#B0564B;          /* soft brick */
  --card:#FFFFFF;
  --line:rgba(38,36,31,.12);
  --shadow:0 8px 26px rgba(38,36,31,.13);
}
body.colorblind{ --ok:#4477AA; --meh:#EE7733; --bad:#882255; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;font-weight:400;
  background:var(--porcelana);color:var(--ink);overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif;font-weight:400}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--acento);outline-offset:2px}

/* ================= MAP ================= */
#map{position:fixed;inset:0;z-index:1;height:100svh;height:100dvh}
.leaflet-container{background:#EDEAE2;font-family:inherit}

/* ================= TOP BAR ================= */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:.9rem 1rem;pointer-events:none;gap:.6rem;
}
.brand{
  pointer-events:auto;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:.5rem 1.15rem;display:flex;align-items:center;gap:.6rem;
  box-shadow:var(--shadow);
}
.brand .logo{font-family:'DM Serif Display',serif;font-size:1.2rem;letter-spacing:.01em}
.brand .logo i{font-style:italic;color:var(--acento)}
.brand .slogan{font-size:.6rem;opacity:.55;max-width:120px;line-height:1.25;display:none}
@media(min-width:600px){.brand .slogan{display:block}}
.top-actions{pointer-events:auto;display:flex;gap:.45rem}
.chip-btn{
  background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:.5rem .95rem;font-size:.76rem;font-weight:600;box-shadow:var(--shadow);
  transition:transform .15s,background .2s;
}
.chip-btn:hover{transform:translateY(-1px)}
.chip-btn.dark{background:var(--ink);color:var(--porcelana);border-color:var(--ink)}
.chip-btn.icon{padding:.5rem .7rem}

/* ================= FILTERS ================= */
.filters{
  position:fixed;top:4.1rem;left:0;right:0;z-index:19;
  display:flex;gap:.4rem;padding:.35rem 1rem;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;
}
.filters::-webkit-scrollbar{display:none}
.filters .f{
  flex-shrink:0;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:.4rem .85rem;font-size:.72rem;font-weight:600;
  box-shadow:0 3px 10px rgba(38,36,31,.08);transition:all .15s;color:var(--ink);
}
.filters .f.on{background:var(--ink);color:var(--porcelana);border-color:var(--ink)}
.filters .f .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.35rem;vertical-align:1px}

/* ================= PANIC ================= */
.panic{
  position:fixed;bottom:max(1.2rem, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  z-index:25;background:var(--acento);color:#fff;border:none;border-radius:999px;
  padding:.95rem 1.8rem;font-size:.92rem;font-weight:700;letter-spacing:.01em;
  box-shadow:0 10px 28px rgba(199,81,70,.4);white-space:nowrap;
  transition:background .2s,transform .15s;animation:breathe 3.2s ease-in-out infinite;
}
@media(max-width:560px){
  .topbar{padding:.65rem .65rem}
  .chip-btn{padding:.42rem .7rem;font-size:.7rem}
  .brand{padding:.45rem .9rem}
  .filters{top:3.6rem}
}
@keyframes breathe{0%,100%{box-shadow:0 10px 28px rgba(199,81,70,.35)}50%{box-shadow:0 10px 34px rgba(199,81,70,.6)}}
.panic:hover{background:var(--acento-dark)}
.panic:active{transform:translateX(-50%) scale(.97)}
.panic.sheet-open{bottom:calc(46vh + 1rem)}
@media(min-width:760px){.panic.sheet-open{bottom:max(1.2rem, env(safe-area-inset-bottom))}}

/* ================= SHEET ================= */
.sheet{
  position:fixed;z-index:22;background:var(--card);border-radius:20px 20px 0 0;
  bottom:0;left:0;right:0;max-height:62vh;max-height:62dvh;overflow-y:auto;
  box-shadow:0 -10px 34px rgba(38,36,31,.16);
  transform:translateY(105%);transition:transform .35s cubic-bezier(.3,.9,.3,1);
  padding:0 1.15rem 1.4rem;border:1px solid var(--line);border-bottom:none;
}
.sheet.open{transform:translateY(0)}
@media(min-width:760px){
  .sheet{left:1.2rem;right:auto;bottom:1.2rem;width:378px;max-height:74vh;border-radius:16px;border-bottom:1px solid var(--line);transform:translateY(0) translateX(-120%)}
  .sheet.open{transform:translateY(0) translateX(0)}
}
.sheet-grab{width:42px;height:4px;border-radius:2px;background:var(--line);margin:.7rem auto .4rem}
@media(min-width:760px){.sheet-grab{display:none}}
.sheet-head{display:flex;justify-content:space-between;align-items:baseline;padding:.65rem 0 .45rem;position:sticky;top:0;background:var(--card);z-index:2}
.sheet-head h2{font-size:1.35rem;letter-spacing:.01em}
.sheet-head .count-note{font-size:.64rem;opacity:.5;display:block;font-family:'DM Sans'}
.sheet-close{background:none;border:none;font-size:1.2rem;opacity:.45;padding:.2rem .4rem}
.sheet-close:hover{opacity:1}

.row{
  display:flex;gap:.85rem;align-items:center;padding:.85rem 0;border-top:1px solid var(--line);
  cursor:pointer;transition:background .15s;
}
.row:hover{background:rgba(38,36,31,.025)}
.row .r-body{flex:1;min-width:0}
.row h3{font-size:1.05rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .r-sub{font-size:.72rem;opacity:.55}
.row .r-dist{font-weight:700;font-size:.86rem;text-align:right}
.row .r-dist small{display:block;font-weight:400;font-size:.6rem;opacity:.5}
.badges{display:flex;gap:.3rem;margin-top:.2rem;flex-wrap:wrap}
.badge{font-size:.6rem;font-weight:700;padding:.14rem .52rem;border-radius:999px;background:rgba(38,36,31,.06)}
.badge.paper-yes{background:rgba(94,140,97,.14);color:#3F6B44}
.badge.paper-maybe{background:rgba(201,162,39,.16);color:#8A6D12}
.badge.paper-no{background:rgba(176,86,75,.13);color:#8E3F35}

/* score pin */
.score-pin{
  width:40px;height:40px;border-radius:50% 50% 50% 5px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:.8rem;border:2.5px solid var(--porcelana);
  box-shadow:0 3px 10px rgba(38,36,31,.3);transform:rotate(-45deg);flex-shrink:0;
  font-family:'DM Sans',sans-serif;
}
.score-pin span{transform:rotate(45deg)}
.score-pin.g{background:var(--ok)}
.score-pin.y{background:var(--meh)}
.score-pin.r{background:var(--bad)}
.score-pin.u{background:#9A958C}
.leaflet-div-icon{background:none;border:none}
.score-pin.selected{width:48px;height:48px;font-size:.92rem}

/* detail */
.detail h2{font-size:1.55rem;line-height:1.12}
.detail .d-addr{font-size:.76rem;opacity:.55;margin:.25rem 0 .6rem}
.rolls{display:flex;gap:.14rem;align-items:center}
.rolls svg{width:24px;height:24px}
.rolls .num{font-weight:700;margin-left:.4rem;font-size:1rem}
.rolls .nrev{font-size:.68rem;opacity:.5;margin-left:.35rem}
.rolls.pickable svg{width:32px;height:32px;cursor:pointer;transition:transform .12s}
.rolls.pickable svg:hover{transform:scale(1.18) rotate(-8deg)}
.mot{margin:.55rem 0;padding:.5rem .8rem;border-radius:10px;font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:.5rem;line-height:1.35}
.mot.yes{background:rgba(94,140,97,.11);color:#3F6B44}
.mot.maybe{background:rgba(201,162,39,.13);color:#8A6D12}
.mot.no{background:rgba(176,86,75,.11);color:#8E3F35}
.d-attrs{display:flex;gap:.4rem;flex-wrap:wrap;margin:.4rem 0 .8rem}
.d-photos{display:flex;gap:.5rem;margin:.6rem 0 1rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.d-photos::-webkit-scrollbar{display:none}
.d-photos img{height:96px;border-radius:10px;cursor:pointer;flex-shrink:0;transition:transform .15s}
.d-photos img:hover{transform:scale(1.04)}
.d-photos .ph{
  flex:1;min-width:140px;aspect-ratio:4/3;border-radius:10px;border:1px dashed var(--line);
  background:var(--porcelana);display:flex;align-items:center;justify-content:center;font-size:.78rem;opacity:.5;text-align:center;padding:.5rem;
}
.lightbox-img{width:100%;border-radius:12px;display:block}
.award{
  display:flex;align-items:center;gap:.85rem;padding:.8rem .2rem;border-top:1px solid var(--line);
  cursor:pointer;transition:background .15s;
}
.award:hover{background:rgba(38,36,31,.03)}
.award .a-emoji{font-size:1.6rem;flex-shrink:0;width:2.2rem;text-align:center}
.award .a-body{flex:1;min-width:0}
.award .a-title{font-size:.66rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--acento)}
.award .a-winner{font-family:'DM Serif Display',serif;font-size:1.05rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.award .a-sub{font-size:.68rem;opacity:.55}
.award .a-stat{font-weight:800;font-size:.92rem;flex-shrink:0;text-align:right}
.award .a-stat small{display:block;font-weight:600;font-size:.58rem;opacity:.5;letter-spacing:.06em;text-transform:uppercase}
.ph-add{
  height:96px;min-width:72px;border:1.5px dashed var(--line);border-radius:10px;background:var(--porcelana);
  font-size:1.3rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;
  color:var(--ink);opacity:.65;flex-shrink:0;transition:all .15s;
}
.ph-add span{font-size:.56rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.ph-add:hover{opacity:1;border-color:var(--acento);color:var(--acento)}
.m-row input[type="file"]{border-style:dashed;font-size:.8rem;padding:.6rem}
.lb-wrap{position:relative}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;border:none;background:rgba(38,36,31,.75);color:var(--porcelana);
  font-size:1.25rem;line-height:1;display:flex;align-items:center;justify-content:center;
}
.lb-nav:hover{background:var(--ink)}
.lb-nav.prev{left:.6rem}
.lb-nav.next{right:.6rem}
.lb-count{text-align:center;font-size:.72rem;opacity:.55;margin-top:.6rem;font-weight:600;letter-spacing:.08em}
.d-review{font-size:.86rem;background:var(--porcelana);border-left:2px solid var(--oro);border-radius:0 10px 10px 0;padding:.8rem .95rem;margin-bottom:1rem;line-height:1.55}
.d-review em{font-family:'DM Serif Display',serif;font-style:italic;font-size:.95rem}
.d-review .who{display:block;font-size:.64rem;opacity:.5;margin-top:.35rem;font-weight:600}
.d-actions{display:flex;gap:.55rem}
.d-actions .btn{padding:.62rem .8rem;font-size:.72rem}
.d-actions .btn-share{padding:.62rem .95rem;font-size:.9rem}
.btn{
  border-radius:999px;border:none;padding:.8rem 1.3rem;font-size:.78rem;font-weight:700;
  transition:transform .15s,background .2s;flex:1;text-align:center;
}
.btn:active{transform:scale(.97)}
.btn-ink{background:var(--ink);color:var(--porcelana)}
.btn-ink:hover{background:#000}
.btn-ghost{background:transparent;border:1.5px solid var(--ink);color:var(--ink)}
.btn-ghost:hover{background:var(--ink);color:var(--porcelana)}
.btn-share{flex:0 0 auto;padding:.8rem 1.05rem;font-size:1rem;line-height:1}
.back-list{background:none;border:none;font-size:.72rem;font-weight:700;opacity:.55;padding:.5rem 0}
.back-list:hover{opacity:1}

/* ================= MODALS ================= */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(38,36,31,.45);backdrop-filter:blur(3px);
  z-index:40;display:none;align-items:flex-end;justify-content:center;
}
@media(min-width:560px){.modal-backdrop{align-items:center}}
.modal-backdrop.open{display:flex}
.modal{
  background:var(--card);width:100%;max-width:430px;max-height:88vh;overflow-y:auto;
  border-radius:20px 20px 0 0;padding:1.6rem 1.4rem 1.8rem;animation:up .3s cubic-bezier(.3,.9,.3,1);
}
@media(min-width:560px){.modal{border-radius:18px}}
.modal{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.modal::-webkit-scrollbar{width:8px}
.modal::-webkit-scrollbar-thumb{background:rgba(38,36,31,.18);border-radius:4px}
.modal::-webkit-scrollbar-track{background:transparent;margin:14px 0}
@keyframes up{from{transform:translateY(36px);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-size:1.5rem;margin-bottom:.15rem}
.modal .m-sub{font-size:.8rem;opacity:.6;margin-bottom:1.2rem}
.m-row{margin-bottom:1.05rem}
.m-row label{display:block;font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;opacity:.6}
.m-row input,.m-row textarea{
  width:100%;border:1.5px solid var(--line);border-radius:11px;padding:.72rem .85rem;
  font-family:inherit;font-size:.94rem;background:var(--porcelana);color:var(--ink);
}
.m-row input:focus,.m-row textarea:focus{outline:none;border-color:var(--ink)}
.seg{display:flex;gap:.35rem}
.seg button{
  flex:1;border:1.5px solid var(--line);background:var(--porcelana);border-radius:9px;
  padding:.55rem .3rem;font-size:.76rem;font-weight:600;transition:all .15s;color:var(--ink);
}
.seg button.on{background:var(--ink);color:var(--porcelana);border-color:var(--ink)}
.auth-tabs{display:flex;gap:.4rem;margin-bottom:1.1rem}
.auth-tabs button{
  flex:1;background:none;border:none;border-bottom:2px solid var(--line);padding:.5rem;
  font-size:.8rem;font-weight:700;opacity:.5;
}
.auth-tabs button.on{opacity:1;border-bottom-color:var(--acento)}
.demo-note{text-align:center;font-size:.6rem;opacity:.4;margin-top:1rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600}

/* ================= TOAST / FLASH ================= */
#toast{
  position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--ink);color:var(--porcelana);padding:.75rem 1.4rem;border-radius:999px;
  font-size:.8rem;font-weight:600;z-index:60;transition:transform .35s cubic-bezier(.3,.9,.3,1);
  box-shadow:var(--shadow);max-width:92vw;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#panicFlash{
  position:fixed;inset:0;background:rgba(38,36,31,.92);z-index:55;pointer-events:none;
  opacity:0;transition:opacity .3s;display:flex;align-items:center;justify-content:center;
}
#panicFlash.go{opacity:1}
#panicFlash .pf-text{
  color:var(--porcelana);font-family:'DM Serif Display',serif;
  font-size:clamp(1.5rem,5.6vw,2.6rem);text-align:center;line-height:1.2;padding:1.2rem;max-width:26ch;
}
#panicFlash .pf-text i{font-style:italic;color:var(--oro)}
.fab-stack{position:fixed;right:1rem;bottom:7.2rem;z-index:21;display:flex;flex-direction:column;gap:.45rem;align-items:flex-end}
.fab-add{
  width:54px;height:54px;border-radius:50%;border:none;background:var(--acento);color:#fff;
  font-size:1.9rem;line-height:1;font-weight:400;box-shadow:0 10px 26px rgba(199,81,70,.45);
  transition:transform .15s,background .2s;
}
.fab-add:hover{background:var(--acento-dark);transform:scale(1.06)}
.fab-add:active{transform:scale(.94)}
#addBanner{
  position:fixed;top:7.4rem;left:50%;z-index:24;
  background:var(--ink);color:var(--porcelana);border-radius:14px;padding:.7rem .8rem;
  display:flex;flex-direction:column;gap:.55rem;font-size:.8rem;font-weight:600;box-shadow:var(--shadow);
  width:min(460px,92vw);
  opacity:0;visibility:hidden;transform:translateX(-50%) translateY(-14px);
  transition:opacity .3s,visibility .3s,transform .3s cubic-bezier(.3,.9,.3,1);
}
#addBanner.on{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.ab-row{display:flex;gap:.5rem;align-items:center;width:100%}
#abSearch{
  flex:1;border:none;border-radius:9px;padding:.6rem .8rem;font-family:inherit;font-size:.88rem;
  background:rgba(248,245,239,.12);color:var(--porcelana);min-width:0;
}
#abSearch::placeholder{color:rgba(248,245,239,.5)}
#abSearch:focus{outline:none;background:rgba(248,245,239,.2)}
.ab-find{background:var(--acento);color:#fff;border:none;border-radius:9px;padding:.6rem 1rem;font-size:.74rem;font-weight:800;letter-spacing:.04em}
.ab-find:hover{background:var(--acento-dark)}
.ab-foot{justify-content:space-between}
.ab-hint{font-size:.68rem;opacity:.65;font-weight:500;flex:1}
.ab-use{background:var(--ok);color:#fff;border:none;border-radius:999px;padding:.4rem .85rem;font-size:.66rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.ab-cancel{background:var(--porcelana);color:var(--ink);border:none;border-radius:999px;padding:.4rem .85rem;font-size:.64rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
#addBanner button{background:var(--porcelana);color:var(--ink);border:none;border-radius:999px;padding:.35rem .8rem;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
#sheet,#sheetBody,.sheet,.sheet-body{scrollbar-width:none;-ms-overflow-style:none}
#sheet::-webkit-scrollbar,#sheetBody::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <span class="logo">Hurry<i>App</i></span>
    <span class="slogan">Make your shitting great again</span>
  </div>
  <div class="top-actions">
    <button class="chip-btn icon" onclick="openHall()" aria-label="Hall of Thrones" title="Hall of Thrones">🏆</button>
    <button class="chip-btn icon" onclick="openSearch()" aria-label="Search a city" title="Search a city">🔍</button>
    <button class="chip-btn icon" onclick="toggleColorblind()" aria-label="Colorblind mode" title="Colorblind mode" id="cbBtn">👁️</button>
    <button class="chip-btn" onclick="openAbout()">About</button>
    <a class="chip-btn" id="adminBtn" href="admin.html" style="display:none;text-decoration:none" title="Throne Room">👑 Admin</a>
    <button class="chip-btn dark" id="loginBtn" onclick="toggleLogin()">Log in</button>
  </div>
</div>

<div class="filters" id="filters">
  <button class="f on" data-f="all">All thrones</button>
  <button class="f" data-f="good"><span class="dot" style="background:var(--ok)"></span>4+ rolls</button>
  <button class="f" data-f="paper">💩 Battle-tested</button>
  <button class="f" data-f="handi">♿ Accessible</button>
  <button class="f" data-f="baby">🚼 Baby changer</button>
  <button class="f" data-f="risky"><span class="dot" style="background:var(--bad)"></span>I like danger</button>
</div>

<button class="panic" id="panicBtn" onclick="panic()">🚨 I need to go. <em>Now.</em></button>

<div class="fab-stack">
  <button class="fab-add" onclick="startAdd()" title="Add a throne" aria-label="Add a throne">＋</button>
  <button class="chip-btn" onclick="openList()" title="Show the list">☰ Thrones</button>
  <button class="chip-btn" onclick="resetMap()" title="Reset the map">⌖ Recenter</button>
</div>

<div id="addBanner">
  <div class="ab-row">
    <input id="abSearch" placeholder="Type an address or a city…" onkeydown="if(event.key==='Enter')abFind()">
    <button class="ab-find" onclick="abFind()">Find</button>
  </div>
  <div class="ab-row ab-foot">
    <span class="ab-hint" id="abHint">👆 …or just tap the map where the throne lives</span>
    <button class="ab-use" id="abUse" style="display:none" onclick="confirmDraft()">✓ Use this spot</button>
    <button class="ab-cancel" onclick="cancelAdd()">Cancel</button>
  </div>

function dist(a,b){
  const R=6371000,dLa=(b[0]-a[0])*Math.PI/180,dLo=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLa/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLo/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

}

const LB = {list:[], i:0, open:false, dead:new Set()};
function lbOpen(i){
  LB.i = i; LB.open = true;
  const many = LB.list.length>1;
  openModal(`
    <div class="lb-wrap">
      <img class="lightbox-img" id="lbImg" src="${LB.list[i]}" alt="Throne photo, full size">

function lbStep(dir){
  if(!LB.open || LB.list.length<2) return;
  let n = LB.i;
  for(let k=0;k<LB.list.length;k++){ // skip photos that 404'd in the strip
    n = (n + dir + LB.list.length) % LB.list.length;
    if(!LB.dead.has(n)) break;
  }
  LB.i = n;
  const img=$("lbImg"), c=$("lbCount");
  if(img) img.src = LB.list[n];
  if(c) c.textContent = `${n+1} / ${LB.list.length}`;
}
function throneURL(id){ return location.origin + location.pathname + "?throne=" + id; }

function panic(){
  exitAddMode();
  const flash = $("panicFlash"), txt = $("pfText");
  txt.innerHTML = "Locating the nearest <i>decent</i> throne…";
  flash.classList.add("go");
  const run = (origin)=>{
    let cands = BATHROOMS.filter(b=>b.score!==null && b.score>=3.8 && b.paper!=="no");
    if(!cands.length) cands = BATHROOMS.filter(b=>b.score!==null && b.score>=3);
    if(!cands.length) cands = BATHROOMS;
    const target = cands.map(b=>({...b,d:dist(origin,[b.lat,b.lng])})).sort((a,b)=>a.d-b.d)[0];
    setTimeout(()=>{
      txt.innerHTML = `<i>${esc(target.name)}</i><br>${distLabel(target.d)} · ${walkTime(target.d)}. Walk fast. Believe.`;
      setTimeout(()=>{
        flash.classList.remove("go");
        openDetail(target.id);
        fakeRoute(target.id);
      },1400);
    },900);
  };
  if(navigator.geolocation){

/* ---- photo upload: resize in the browser (max 1600px, q80), then Storage + DB ---- */
async function resizeToJpeg(file, maxSide=1600, quality=.8){
  let bmp;
  try{ bmp = await createImageBitmap(file, {imageOrientation:"from-image"}); }
  catch(e){
    bmp = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
  }
  const w = bmp.width, h = bmp.height, k = Math.min(1, maxSide/Math.max(w,h));
  const c = document.createElement("canvas");
  c.width = Math.round(w*k); c.height = Math.round(h*k);
  c.getContext("2d").drawImage(bmp, 0, 0, c.width, c.height);
  return new Promise(res=>c.toBlob(res, "image/jpeg", quality));
}
async function uploadPhotos(bathroomId, files){
  let done = 0;
  for(const f of files){
    toast(`📸 Uploading ${done+1}/${files.length}…`);
    try{
      const blob = await resizeToJpeg(f);
      if(!blob) throw new Error("could not read that image");
      const base = (f.name||"photo").toLowerCase().replace(/[^a-z0-9._-]/g,"").replace(/\.[a-z0-9]+$/,"").slice(-40) || "photo";
      const key = `${bathroomId}/${crypto.randomUUID()}-${base}.jpg`;
      const {error:e1} = await supa.storage.from("photos").upload(key, blob, {contentType:"image/jpeg"});
      if(e1) throw e1;
      const {error:e2} = await supa.rpc("add_photo",{p_bathroom_id:bathroomId, p_file_name:key});
      if(e2) throw e2;
      done++;
    }catch(e){ toast("😬 "+(e.message||"upload failed")); }
  }
  return done;
}

const HALL_COUNTRIES = ["spain","espana","españa","catalonia","cataluna","cataluña","united states","estados unidos","france","greece","turkey","south africa","argentina","andorra","switzerland","united kingdom","canada","usa","uk"];
function cityOf(addr){
  if(!addr) return null;
  const toks = String(addr).split(",");
  const cands = [];
  for(let i=toks.length-1; i>=1 && cands.length<2; i--){
    const t = toks[i].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\b\d+\b/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();
    if(t.length>2 && !HALL_COUNTRIES.includes(t)) cands.push(t);
  }
  const c = cands[1] || cands[0];
  return c ? c.replace(/\b\w/g, m=>m.toUpperCase()) : null;
}
function best(list, fn, dir=1){ // dir 1 = max, -1 = min
  const c = list.filter(b=>fn(b)!=null && !isNaN(fn(b)));
  if(!c.length) return null;
  return c.sort((a,b)=>(fn(b)-fn(a))*dir || b.n-a.n)[0];
}
function awardRow(emoji, title, b, stat, statLabel){
  if(!b) return "";
  return `<div class="award" onclick="closeModal();openDetail(${b.id})">
    <span class="a-emoji">${emoji}</span>
    <div class="a-body">
      <div class="a-title">${title}</div>
      <div class="a-winner">${esc(b.name)}</div>
      <div class="a-sub">${esc(b.addr)}</div>
    </div>
    <span class="a-stat">${stat}<small>${statLabel}</small></span>
  </div>`;
}
function openHall(){
  const R = BATHROOMS.filter(b=>b.score!==null);
  if(!R.length){ toast("The Hall awaits its first legends."); return; }
  // median for the Pilgrimage award
  const lats=R.map(b=>b.lat).sort((a,b)=>a-b), lngs=R.map(b=>b.lng).sort((a,b)=>a-b);
  const med=[lats[Math.floor(lats.length/2)], lngs[Math.floor(lngs.length/2)]];
  const gold   = best(R, b=>b.score, 1);
  const danger = best(R, b=>b.score, -1);
  const soft   = best(R, b=>b.soft, 1);
  const sand   = best(R, b=>b.soft, -1);
  const photo  = best(BATHROOMS, b=>b.photos||null, 1);
  const tested = best(R.filter(b=>b.paper==="yes"), b=>b.n, 1);
  const nose   = best(R, b=>b.smell, -1);
  const rose   = best(R, b=>b.smell, 1);
  const clean  = best(R, b=>b.clean, 1);
  const far    = best(R, b=>dist(med,[b.lat,b.lng]), 1);
  openModal(`
    <h2>🏆 Hall of Thrones</h2>
    <p class="m-sub">The annual awards nobody asked for. Computed live from ${BATHROOMS.length} real thrones — tap any winner to visit.</p>
    ${awardRow("👑","The Golden Throne", gold, gold?gold.score.toFixed(1):"", "rolls")}
    ${awardRow("☠️","The Danger Zone", danger, danger?danger.score.toFixed(1):"", "rolls")}
    ${awardRow("💩","Most Battle-Tested", tested, tested?tested.n:"", "verdicts")}
    ${awardRow("☁️","Softest Paper in the Land", soft, soft?soft.soft.toFixed(1):"", "softness")}
    ${awardRow("🪵","The Sandpaper Award", sand, sand?sand.soft.toFixed(1):"", "softness")}
    ${awardRow("🧼","The Operating Room", clean, clean?clean.clean.toFixed(1):"", "cleanliness")}
    ${awardRow("🌹","Smells Like Victory", rose, rose?rose.smell.toFixed(1):"", "smell")}
    ${awardRow("☣️","The Nose Destroyer", nose, nose?nose.smell.toFixed(1):"", "smell")}
    ${awardRow("📸","Most Photographed", photo, photo?photo.photos:"", "photos")}
    ${awardRow("🗺️","The Pilgrimage", far, far?(dist(med,[far.lat,far.lng])>=1000?Math.round(dist(med,[far.lat,far.lng])/100)/10+"k":Math.round(dist(med,[far.lat,far.lng])))+" km":"", "from the pack")}
    ${cityChampions(R)}
    <button class="btn btn-ghost" style="width:100%;margin-top:1.1rem" onclick="openLeaderboard()">🎖️ Contributor Leaderboard</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:.55rem" onclick="shareHall()">↗ Share the ceremony</button>
    <p class="demo-note">Winners update as the community judges. Democracy at its finest.</p>`);
}
function cityChampions(R){
  const groups = {};
  R.forEach(b=>{ const c = cityOf(b.addr); if(c){ (groups[c]=groups[c]||[]).push(b); } });
  const cities = Object.entries(groups).filter(([,v])=>v.length>=3)
    .sort((a,b)=>b[1].length-a[1].length).slice(0,6);
  if(!cities.length) return "";
  return `
    <div style="margin-top:1.3rem;padding-top:.4rem">
      <div class="a-title" style="font-size:.66rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--acento)">🏙️ City Champions</div>
    </div>
    ${cities.map(([city,list])=>{
      const champ = list.slice().sort((a,b)=>b.score-a.score || b.n-a.n)[0];
      return `<div class="award" onclick="closeModal();openDetail(${champ.id})">
        <span class="a-emoji">🏙️</span>
        <div class="a-body">
          <div class="a-title">${esc(city)} · ${list.length} thrones</div>
          <div class="a-winner">${esc(champ.name)}</div>
        </div>
        <span class="a-stat">${champ.score.toFixed(1)}<small>rolls</small></span>
      </div>`;
    }).join("")}`;
}
async function shareHall(){
  const url = location.origin + location.pathname + "?hall=1";
  const text = "🏆 The Hall of Thrones — the best (and worst) bathrooms on Earth, judged by people who were there.";
  if(navigator.share){
    try{ await navigator.share({title:"HurryApp · Hall of Thrones", text, url}); return; }
    catch(e){ if(e && e.name==="AbortError") return; }
  }
  try{ await navigator.clipboard.writeText(text+" "+url); toast("🔗 Ceremony link copied. Spread the glory."); }
  catch(e){ prompt("Copy the Hall link:", url); }
}

/* ---- 🎖️ karma & ranks ---- */
const RANKS = [
  [0,   "Restroom Rookie", "🚽"],
  [25,  "Squire of the Seat", "🪑"],
  [75,  "Knight of the Round Bowl", "⚔️"],
  [150, "Throne Baron", "🎩"],
  [300, "Flush Duke", "💎"],
  [600, "Porcelain Emperor", "👑"],
];
function rankFor(k){
  let cur = RANKS[0], next = null;
  for(let i=0;i<RANKS.length;i++){
    if(k >= RANKS[i][0]) cur = RANKS[i];
    else { next = RANKS[i]; break; }
  }
  return {title:cur[1], emoji:cur[2], next};
}
async function openLeaderboard(){
  openModal(`<h2>🎖️ The Contributors</h2><p class="m-sub">Summoning the heroes…</p>`);
  let mineHtml = "";
  if(loggedIn){
    const {data:mk} = await supa.rpc("my_karma");
    if(mk && mk.length){
      const m = mk[0], r = rankFor(+m.karma);
      const toNext = r.next ? `${r.next[0]-m.karma} karma to ${r.next[2]} ${r.next[1]}` : "Maximum glory achieved.";
      mineHtml = `<div class="mot yes" style="margin:.2rem 0 1rem">${r.emoji} You: <b>${m.karma} karma</b> · ${r.title}<br><span style="font-weight:400;font-size:.74rem;opacity:.75">${m.reviews} reviews · ${m.thrones} thrones · ${m.photos} photos — ${toNext}</span></div>`;
    }
  }
  const {data,error} = await supa.rpc("leaderboard");
  if(error){ openModal(`<h2>🎖️ The Contributors</h2><p class="m-sub">😬 ${esc(error.message)}</p>`); return; }
  const medal = i => i===0?"🥇":i===1?"🥈":i===2?"🥉":`<span style="opacity:.4;font-size:.8rem">#${i+1}</span>`;
  openModal(`
    <h2>🎖️ The Contributors</h2>
    <p class="m-sub">+10 per review · +25 per throne discovered · +5 per photo. Glory is earned one flush at a time.</p>
    ${mineHtml}
    ${data.map((u,i)=>{
      const r = rankFor(+u.karma);
      return `<div class="award">
        <span class="a-emoji">${medal(i)}</span>
        <div class="a-body">
          <div class="a-winner">@${esc(u.username)} <span style="font-size:.8rem">${r.emoji}</span></div>
          <div class="a-sub">${r.title} · ${u.reviews} reviews · ${u.thrones} thrones · ${u.photos} photos</div>
        </div>
        <span class="a-stat">${u.karma}<small>karma</small></span>
      </div>`;
    }).join("")}
    <p class="demo-note">Top 20 · usernames only, dignity optional</p>`);
}

/* ================= INIT ================= */
(async function(){
  try{
    if(SUPABASE_URL.indexOf("PASTE")===0) throw new Error("missing config");
    supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    supa.auth.getSession().then(({data})=>setAuthUI(data.session));
    supa.auth.onAuthStateChange((event,session)=>{setAuthUI(session);if(event==="PASSWORD_RECOVERY")openSetPassword();});
    $("photoInput").addEventListener("change", async function(){
      const files = [...this.files];
      if(!files.length || uploadTargetId==null) return;
      const id = uploadTargetId;
      const n = await uploadPhotos(id, files);
      if(n){
        const b = BATHROOMS.find(x=>x.id===id);
        if(b) b.photos += n;
        toast(`📸 ${n} photo${n===1?"":"s"} up. +${n*5} karma. The archive grows.`);
        loadMyKarma();
        if(selectedId===id) loadPhotos(id);
      }
    });
    await loadThrones();
    if(!BATHROOMS.length) throw new Error("view returned 0 rows — did you run the map_thrones SQL?");
    YOU = [
      BATHROOMS.reduce((a,b)=>a+b.lat,0)/BATHROOMS.length,
      BATHROOMS.reduce((a,b)=>a+b.lng,0)/BATHROOMS.length
    ];
    initMap();
    map.fitBounds(BATHROOMS.map(b=>[b.lat,b.lng]),{padding:[60,60],maxZoom:15});
    if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>{YOU=[p.coords.latitude,p.coords.longitude]});
    const params = new URLSearchParams(location.search);
    const deepId = parseInt(params.get("throne"),10);
    const deepB = BATHROOMS.find(b=>b.id===deepId);
    if(params.get("hall")){
      setTimeout(openHall, 600);
      toast("🏆 Welcome to the ceremony.");
    } else if(deepB){
      setTimeout(()=>openDetail(deepB.id), 400);
      toast(`🧻 Someone sent you a throne. Judge it well.`);
    } else {
      setTimeout(openList, 500);
      toast(`🧻 ${BATHROOMS.length} real thrones loaded. This is not a drill.`);
    }
  }catch(e){
    document.body.innerHTML = '<div style="font-family:DM Sans,sans-serif;padding:3rem;max-width:62ch;margin:auto;color:#26241F"><h1 style="font-family:DM Serif Display,serif;font-size:2rem">Almost there.</h1><p style="margin-top:1rem;line-height:1.7">1. Open this file in a text editor.<br>2. Paste your <b>SUPABASE_URL</b> and <b>SUPABASE_ANON_KEY</b> at the top of the &lt;script&gt; (Supabase → Settings → API).<br>3. Make sure you ran the <code>map_thrones</code> SQL.<br><br><span style="opacity:.6">Details: '+e.message+'</span></p></div>';
  }
})();
